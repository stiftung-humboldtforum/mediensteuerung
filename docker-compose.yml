version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  db:
    image: mongo:6.0.5
    container_name: db
    logging: *default-logging
    environment:
      - MONGO_INITDB_HOSTNAME=$MONGO_INITDB_HOSTNAME
      - MONGO_INITDB_DATABASE=$MONGO_INITDB_DATABASE
      - MONGO_INITDB_USERNAME=$MONGO_INITDB_USERNAME
      - MONGO_INITDB_PASSWORD=$MONGO_INITDB_PASSWORD
    volumes:
      - ./backend/db/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
      - ./backend/db/humboldt-mongo-volume:/data/db
    network_mode:
      host
      #    command: mongod --replSet rs0 --bind_ip_all
    command: mongod --quiet
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok && exit()' | mongosh --quiet
      interval: 10s
      timeout: 20s
      retries: 50
      start_period: 30s
  broker:
    image: eclipse-mosquitto:2.0.18-openssl
    container_name: hufbroker
    logging: *default-logging
    volumes:
      - ./backend/broker/mosquitto/config:/mosquitto/config
      - ./backend/broker/tls:/opt/tls
    network_mode: host
    restart: always
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "mosquitto_sub -h localhost -p 8883 -t '#' --cafile /opt/tls/ca_certificate.pem --cert /opt/tls/server_certificate.pem --key /opt/tls/server_key.pem -E -i healthcheck | grep -v Error && exit 1 || exit 0",
        ]
      interval: 10s
      timeout: 5s
  api:
    image: hufapi
    build: ./backend/api
    container_name: hufapi
    logging: *default-logging
    environment:
      - MONGO_INITDB_USERNAME=$MONGO_INITDB_USERNAME
      - MONGO_INITDB_PASSWORD=$MONGO_INITDB_PASSWORD
      - MONGO_INITDB_HOSTNAME=$MONGO_INITDB_HOSTNAME
      - MONGO_INITDB_DATABASE=$MONGO_INITDB_DATABASE
      - MQTT_HOSTNAME=$MQTT_HOSTNAME
      - API_SECRET=$API_SECRET
      - API_SYSTEM_USERNAME=$API_SYSTEM_USERNAME
      - API_SYSTEM_PASSWORD=$API_SYSTEM_PASSWORD
      - NETBOX_API_URL=$NETBOX_API_URL
      - NETBOX_API_TOKEN=$NETBOX_API_TOKEN
    volumes:
      - ./backend/api:/api
      - ./backend/broker/tls:/opt/tls
      - ./backend/mkcert/certs:/opt/certs
      # /config route (routes/config.py) reads+writes the manager config.yml
      - ./backend/manager/config:/manager/config
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    network_mode: host
    command: uvicorn app:app --reload --host 0.0.0.0 --port 80 --port 443 --ssl-keyfile /opt/certs/${HOSTNAME}+5-key.pem --ssl-certfile /opt/certs/${HOSTNAME}+5.pem
    restart: always
    depends_on:
      broker:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: curl --fail --insecure https://localhost:443/healthcheck
      interval: 120s
      timeout: 120s
      retries: 5
      start_period: 5s
  manager:
    image: avorus-manager
    build: ./backend/manager
    container_name: hufmanager
    logging: *default-logging
    environment:
      - MQTT_HOSTNAME=$MQTT_HOSTNAME
      - MONGO_INITDB_HOSTNAME=$MONGO_INITDB_HOSTNAME
      - MONGO_INITDB_DATABASE=$MONGO_INITDB_DATABASE
      - MONGO_INITDB_USERNAME=$MONGO_INITDB_USERNAME
      - MONGO_INITDB_PASSWORD=$MONGO_INITDB_PASSWORD
      - API_HOSTNAME=$API_HOSTNAME
      - API_ROOT_CA=$API_ROOT_CA
      - API_SYSTEM_USERNAME=$API_SYSTEM_USERNAME
      - API_SYSTEM_PASSWORD=$API_SYSTEM_PASSWORD
      - PJLINK_PASSWORD=$PJLINK_PASSWORD
      - PDU_COMMUNITYSTRING=$PDU_COMMUNITYSTRING
    volumes:
      - ./backend/manager:/app
      - ./backend/broker/tls:/opt/tls
      - $API_ROOT_CA:$API_ROOT_CA
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    network_mode: host
    privileged: true
    command: python3 /app/app.py
    restart: always
    depends_on:
      broker:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import time; ten_minutes_ago = time.time() - 600; exit(float(open('/tmp/health').read().strip()) < ten_minutes_ago)\""]
      interval: 1m
      timeout: 10s
      retries: 3
  calendar:
    image: hufcalender
    build: ./backend/calendar
    container_name: hufcalendar
    logging: *default-logging
    environment:
      - MQTT_HOSTNAME=$MQTT_HOSTNAME
      - MONGO_INITDB_HOSTNAME=$MONGO_INITDB_HOSTNAME
      - MONGO_INITDB_DATABASE=$MONGO_INITDB_DATABASE
      - MONGO_INITDB_USERNAME=$MONGO_INITDB_USERNAME
      - MONGO_INITDB_PASSWORD=$MONGO_INITDB_PASSWORD
    volumes:
      - ./backend/calendar:/app
      - ./backend/broker/tls:/opt/tls
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    network_mode: host
    command: python3 /app/app.py
    restart: always
    depends_on:
      broker:
        condition: service_healthy
      api:
        condition: service_healthy
  knx:
    image: hufknx
    build: ./backend/knx
    container_name: hufknx
    logging: *default-logging
    environment:
      - MQTT_HOSTNAME=$MQTT_HOSTNAME
      - API_HOSTNAME=$API_HOSTNAME
      - API_ROOT_CA=$API_ROOT_CA
      - API_SYSTEM_USERNAME=$API_SYSTEM_USERNAME
      - API_SYSTEM_PASSWORD=$API_SYSTEM_PASSWORD
      - KNX_GATEWAY_IP=$KNX_GATEWAY_IP
      - KNXKEYS_FILE_PATH=$KNXKEYS_FILE_PATH
      - KNXKEYS_PASSWORD=$KNXKEYS_PASSWORD
    volumes:
      - ./backend/knx:/app
      - ./backend/broker/tls:/opt/tls
      - $API_ROOT_CA:$API_ROOT_CA
    network_mode: host
    command: python3 /app/app.py
    restart: always
    depends_on:
      broker:
        condition: service_healthy
      api:
        condition: service_healthy
  fac:
    image: huffac
    build: ./backend/fac
    container_name: huffac
    logging: *default-logging
    environment:
      - MQTT_HOSTNAME=$MQTT_HOSTNAME
      # app.py liest os.environ['COMMUNITYSTRING']; Wert kommt aus .env
      - COMMUNITYSTRING=$FAC_COMMUNITYSTRING
    volumes:
      - ./backend/fac:/app
      - ./backend/broker/tls:/opt/tls
    network_mode: host
    command: python3 /app/app.py
    restart: always
    depends_on:
      broker:
        condition: service_healthy
      api:
        condition: service_healthy
networks:
  pubsub:
    driver: bridge
