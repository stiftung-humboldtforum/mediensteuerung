version: '3.8'
services:
  mkcert:
    image: mkcert
    build: ./backend/mkcert
    container_name: mkcert
    environment:
      # Interpolated by compose from .env so mkcert.sh issues the leaf cert for
      # the host FQDN + extra SANs, NOT the random container id (otherwise the
      # api cert SAN is the container id and manager/knx TLS verification fails).
      - HOSTNAME=$HOSTNAME
      - MKCERT_EXTRA_SANS=$MKCERT_EXTRA_SANS
    volumes:
      - ./backend/mkcert/certs:/root
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    # MKCERT_EXTRA_SANS: standortspezifische SANs (interne FQDNs, IPs) aus .env.
    # mkcert.sh runs the same mkcert invocation AND creates the stable
    # api.pem/api-key.pem symlinks the api TLS command expects (the raw `mkcert`
    # command alone only emits the brittle ${HOSTNAME}+N.pem leaf names).
    command: /mkcert.sh
  tls-gen:
    image: tls-gen
    build: ./backend/tlsgen
    container_name: tls-gen
    volumes:
      - ./backend/broker/tls:/opt/tls-out
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    # $HOSTNAME (host name, interpolated by compose) becomes the certificate CN,
    # matching the mkcert service above and the broker/client hostnames.
    command: /generate.sh $HOSTNAME
